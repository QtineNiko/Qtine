<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 仪表盘</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px;display:flex;align-items:center;gap:8px}
.top-bar .brand span.label{color:var(--p)}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;box-shadow:0 0 10px currentColor}
.dot.online{background:var(--su);color:var(--su)}
.dot.offline{background:var(--e);color:var(--e)}
.mono{font:var(--mono);color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.primary{background:var(--p);color:var(--op);border-color:transparent}
.btn.primary:hover{background:#E9DDFF}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── 统计卡片 ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--sf);border-radius:var(--rad-l);border:1px solid var(--olv);padding:20px;position:relative;overflow:hidden;transition:all var(--tr);box-shadow:var(--elev1);animation:fadeInUp .35s ease-out both}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--p);opacity:0;transition:opacity var(--tr)}
.stat-card:hover::before{opacity:1}
.stat-card:hover{transform:translateY(-2px);border-color:var(--pc)}
.stat-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-card .head .icon{width:40px;height:40px;border-radius:var(--rad-s);background:var(--pc);color:var(--p);display:flex;align-items:center;justify-content:center;font:500 20px/24px Roboto,sans-serif;flex-shrink:0}
.stat-card .head .tag{font:500 11px/16px Roboto,sans-serif;color:var(--on-sv);letter-spacing:.5px;text-transform:uppercase}
.stat-card .val{font:500 32px/40px Roboto,sans-serif;color:var(--on-s);letter-spacing:-.5px;margin-bottom:4px}
.stat-card .sub{font:400 13px/18px Roboto,sans-serif;color:var(--on-sv)}

/* ── 两列 ── */
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:12px}

/* ── 面板 ── */
.panel{background:var(--sf);border-radius:var(--rad-l);border:1px solid var(--olv);overflow:hidden;box-shadow:var(--elev1);animation:fadeInUp .35s ease-out both}
.panel .head{padding:16px 20px;border-bottom:1px solid var(--olv);display:flex;align-items:center;justify-content:space-between}
.panel .head h3{font:500 16px/24px Roboto,sans-serif;color:var(--on-s)}
.panel .body{padding:20px}

/* ── 图表 ── */
.chart-box{height:260px}
.chart-box canvas{width:100%!important;height:100%!important}

/* ── 列表 ── */
.list{display:flex;flex-direction:column;gap:10px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--sfc);border-radius:var(--rad-m);border:1px solid transparent;transition:all var(--tr)}
.list-item:hover{border-color:var(--olv)}
.list-item .icon{width:36px;height:36px;border-radius:var(--rad-s);background:var(--pc);color:var(--p);display:flex;align-items:center;justify-content:center;font:500 14px/20px Roboto,sans-serif;flex-shrink:0;text-transform:uppercase}
.list-item .info{flex:1;min-width:0}
.list-item .info .name{font:500 14px/20px Roboto,sans-serif;color:var(--on-s)}
.list-item .info .meta{font:400 12px/16px Roboto,sans-serif;color:var(--on-sv);margin-top:2px}
.list-item .info .meta span{margin-right:12px}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 12px/16px Roboto,sans-serif;border:1px solid var(--ol)}
.chip.ok{background:rgba(125,215,141,.15);color:var(--su)}.chip.err{background:rgba(242,184,181,.15);color:var(--e)}

/* ── 消息列表 ── */
.msg-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.msg-item{display:flex;gap:10px;padding:12px;background:var(--sfc);border-radius:var(--rad-m);border-left:3px solid var(--p);animation:fadeInUp .3s ease-out both;transition:background var(--tr)}
.msg-item:hover{background:rgba(208,188,255,.04)}
.msg-item .avatar{width:30px;height:30px;border-radius:var(--rad-s);background:var(--pc);color:var(--p);display:flex;align-items:center;justify-content:center;font:500 12px/16px Roboto,sans-serif;flex-shrink:0;text-transform:uppercase}
.msg-item .content{flex:1;min-width:0}
.msg-item .content .head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msg-item .content .head .user{font:500 13px/18px Roboto,sans-serif;color:var(--on-s)}
.msg-item .content .head .time{font:400 11px/14px Roboto,sans-serif;color:var(--on-sv)}
.msg-item .content .text{font:400 13px/18px Roboto,sans-serif;color:var(--on-sv);white-space:pre-wrap;word-break:break-all;line-height:1.5}
.empty{padding:40px 16px;text-align:center;color:var(--on-sv);font-size:13px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:1280px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.stats-grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
<script src="/static/theme.js"></script>
</head><body>

    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main">
    <div class="stats-grid">
      <div class="stat-card"><div class="head"><div class="icon">◉</div><div class="tag">运行状态</div></div><div class="val" id="s-status">运行中</div><div class="sub" id="s-uptime">--</div></div>
      <div class="stat-card"><div class="head"><div class="icon">✉</div><div class="tag">消息总数</div></div><div class="val" id="s-msgs">0</div><div class="sub" id="s-rate">-- 条/分</div></div>
      <div class="stat-card"><div class="head"><div class="icon">◎</div><div class="tag">内存</div></div><div class="val" id="s-mem">-- MB</div><div class="sub" id="s-mem-pct">--</div></div>
      <div class="stat-card"><div class="head"><div class="icon">▤</div><div class="tag">CPU</div></div><div class="val" id="s-cpu">--%</div><div class="sub" id="s-cpu-cores">-- 核心</div></div>
    </div>
    <div class="two-col">
      <div class="panel"><div class="head"><h3>消息速率</h3><span class="chip" id="chart-badge">实时</span></div><div class="body"><div class="chart-box"><canvas id="chart"></canvas></div></div></div>
      <div class="panel"><div class="head"><h3>适配器</h3><span class="chip" id="adapter-count">0</span></div><div class="body"><div class="list" id="adapter-list"><div class="empty">暂无适配器</div></div></div></div>
    </div>
    <div class="panel"><div class="head"><h3>实时消息</h3><span class="chip" id="live-count">0</span></div><div class="body"><div class="msg-list" id="msg-list"><div class="empty">等待消息中...</div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
(function(){
  function logout(){fetch('/api/logout',{method:'POST'}).then(function(r){if(r.status===401){location.href='/webui/login';return}}).finally(function(){localStorage.removeItem('qtine_auth');location.href='/webui/login'})}window.logout=logout
  function fmtUptime(s){var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);if(d>0)return d+'天 '+h+'时';if(h>0)return h+'时 '+m+'分';return m+'分'}
  var hist=[],chart=null;
  function initChart(){var ctx=document.getElementById('chart').getContext('2d');chart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[{label:'消息/分',data:[],borderColor:'#D0BCFF',backgroundColor:'rgba(208,188,255,.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#2B2930',borderColor:'rgba(73,69,79,.6)',borderWidth:1,titleColor:'#E6E1E5',bodyColor:'#CAC4D0',padding:12,cornerRadius:8}},scales:{x:{display:false},y:{beginAtZero:true,grid:{color:'rgba(73,69,79,.4)'},ticks:{color:'#CAC4D0',font:{size:11}}}}}})}
  function addMsg(msg){var list=document.getElementById('msg-list');var cnt=document.getElementById('live-count');if(list.querySelector('.empty'))list.innerHTML='';var item=document.createElement('div');item.className='msg-item';var ts=new Date(msg.timestamp||Date.now());var t=ts.getHours().toString().padStart(2,'0')+':'+ts.getMinutes().toString().padStart(2,'0')+':'+ts.getSeconds().toString().padStart(2,'0');var avatar=(msg.sender||'?').charAt(0).toUpperCase();item.innerHTML='<div class="avatar">'+avatar+'</div><div class="content"><div class="head"><span class="user">'+(msg.sender||'未知')+'</span><span class="time">'+t+'</span></div><div class="text">'+(msg.content||'')+'</div></div>';list.insertBefore(item,list.firstChild);if(list.children.length>50)list.removeChild(list.lastChild);cnt.textContent=list.children.length}
  var prevTotal=0,prevTime=Date.now();
  function fetchAll(){
    fetch('/api/status').then(function(r){if(r.status===401){location.href='/webui/login';return}return r.json()}).then(function(d){
      if(!d)return;
      var running=d.status==='running';
      document.getElementById('dot').className='dot '+(running?'online':'offline');
      document.getElementById('s-status').textContent=running?'运行中':'已停止';
      document.getElementById('s-uptime').textContent='已运行 '+fmtUptime(d.uptime||0);
      document.getElementById('ver').textContent=d.version||'v1.1.0';
      var total=0;var list=document.getElementById('adapter-list');var adapters=d.adapters||[];
      document.getElementById('adapter-count').textContent=adapters.length;
      if(adapters.length===0){list.innerHTML='<div class="empty">暂无适配器</div>'}else{
        list.innerHTML='';adapters.forEach(function(a){
          total+=a.message_count||0;var item=document.createElement('div');item.className='list-item';
          var st=a.status==='connected'?'ok':'err';var stText=a.status==='connected'?'已连接':'未连接';
          item.innerHTML='<div class="icon">'+(a.name||'?').charAt(0).toUpperCase()+'</div><div class="info"><div class="name">'+a.name+'</div><div class="meta"><span>'+a.protocol+'</span><span>收:'+(a.received_count||0)+'</span><span>发:'+(a.sent_count||0)+'</span></div></div><span class="chip '+st+'">'+stText+'</span>';
          list.appendChild(item);
        });
      }
      var now=Date.now(),dt=(now-prevTime)/1000/60;prevTime=now;
      var rate=dt>0?Math.round((total-prevTotal)/dt):0;prevTotal=total;
      document.getElementById('s-msgs').textContent=total;document.getElementById('s-rate').textContent=rate+' 条/分';
      hist.push(rate);if(hist.length>30)hist.shift();
      if(chart){chart.data.datasets[0].data=hist;chart.update('none')}
    });
    fetch('/api/metrics').then(function(r){if(r.status===401){location.href='/webui/login';return}return r.json()}).then(function(d){
      if(!d||!d.success)return;
      var mb=d.process&&d.process.memory_mb?d.process.memory_mb:0;document.getElementById('s-mem').textContent=mb.toFixed(0)+' MB';
      if(d.system&&d.system.total_memory){var pct=(mb*1024*1024/d.system.total_memory*100).toFixed(1);document.getElementById('s-mem-pct').textContent='占用率 '+pct+'%'}
      var cpu=d.process&&typeof d.process.cpu_percent==='number'?d.process.cpu_percent:0;document.getElementById('s-cpu').textContent=cpu.toFixed(1)+'%';
      if(d.system&&d.system.cpu_count){document.getElementById('s-cpu-cores').textContent=d.system.cpu_count+' 核心'}
    }).catch(function(){});
  }
  initChart();fetchAll();setInterval(fetchAll,5000);
  var socket=io();socket.on('message',addMsg);socket.on('metrics',function(d){if(d.message_count){document.getElementById('s-msgs').textContent=d.message_count;var now=Date.now(),dt=(now-prevTime)/1000/60;var rate=dt>0?Math.round((d.message_count-prevTotal)/dt):0;document.getElementById('s-rate').textContent=rate+' 条/分';prevTotal=d.message_count;prevTime=now;hist.push(rate);if(hist.length>30)hist.shift();if(chart)chart.data.datasets[0].data=hist;chart.update('none')}});
})();
</script></body></html>
