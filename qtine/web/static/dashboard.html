<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 仪表盘</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--s:#CCC2DC;--os:#332D41;--sc:#4A4458;--t:#EFB8C8;--e:#F2B8B5;--oe:#601410;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sf-low:#1D1B20;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-xl:28px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0;z-index:10}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.top-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
.dot.online{background:var(--su)}.dot.offline{background:var(--e)}.dot.connecting{background:var(--w)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:var(--rad-f);font:500 11px/16px Roboto,sans-serif;background:var(--p);color:var(--op)}
.mono{font:var(--mono);color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:none;cursor:pointer;transition:all var(--tr);background:transparent;color:var(--on-sv)}
.btn:hover{background:rgba(202,196,208,.08)}
.btn.danger{color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:16px;box-shadow:var(--elev1)}
.card.colored{background:var(--pc);color:#EADDFF;border-color:transparent}
.card h3{font:500 14px/20px Roboto,sans-serif;color:var(--on-sv);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.card.colored h3{color:rgba(234,221,255,.7)}
.card .val{font:400 24px/32px Roboto,sans-serif}
.chart-box{width:100%;height:180px}
.log-box{background:var(--sf-low);border-radius:var(--rad-m);border:1px solid var(--olv);padding:12px;height:280px;overflow-y:auto;font:var(--mono)}
.log-line{padding:1px 0;white-space:pre-wrap;word-break:break-all;font-size:12px}
.muted{color:var(--on-sv)}
.row{display:flex;align-items:center;gap:8px;padding:4px 0}
.dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-sm.online{background:var(--su)}.dot-sm.offline{background:var(--e)}.dot-sm.connecting{background:var(--w)}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 12px/16px Roboto,sans-serif;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol)}
.chip.ok{background:rgba(125,215,141,.15);color:var(--su)}.chip.err{background:rgba(242,184,181,.15);color:var(--e)}.chip.warn{background:rgba(255,217,112,.15);color:var(--w)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
<script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
</head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>控制台</span><span class="dot online" id="dot"></span></div>
  </div>
  <span class="mono" style="opacity:.6;font-size:12px" id="ver">v1.1.0</span>
  <button class="btn" onclick="logout()" style="margin-left:12px">退出登录</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item active" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main">
    <div class="grid">
      <div class="card colored"><h3>运行状态</h3><div class="val" id="status">--</div></div>
      <div class="card colored"><h3>运行时长</h3><div class="val" id="uptime">--</div></div>
      <div class="card"><h3>插件</h3><div class="val"><span id="pen">0</span> / <span id="ptot">0</span></div><span class="muted" style="font-size:12px">已启用 / 总计</span></div>
      <div class="card"><h3>适配器</h3><div id="adapters"></div></div>
      <div class="card"><h3>内存使用</h3><div class="val" id="mem">-- MB</div><span class="muted" style="font-size:12px">进程内存</span></div>
      <div class="card"><h3>CPU</h3><div class="val" id="cpu">--%</div><span class="muted" style="font-size:12px">进程占用</span></div>
      <div class="card"><h3>定时任务</h3><div class="val" id="tasks">0</div><span class="muted" style="font-size:12px">已注册任务</span></div>
    </div>
    <div class="card"><h3>消息速率</h3><div class="chart-box"><canvas id="chart"></canvas></div></div>
    <div class="card"><h3>实时消息 <span class="badge" id="live-count">0</span></h3><div class="log-box" id="live-msgs"><div class="log-line muted">等待中...</div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function(){
  function logout(){localStorage.removeItem('qtine_auth');location.href='/webui/login'}
  function fmt(s){var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),se=Math.floor(s%60);return d+'天 '+h+'时 '+m+'分 '+se+'秒'}
  var hist=[],chart=null;
  function fetchStatus(){
    fetch('/api/status').then(function(r){
      if(r.status===401){logout();return}
      return r.json()
    }).then(function(d){
      if(!d)return;
      document.getElementById('status').textContent=d.status==='running'?'运行中':'已停止';
      document.getElementById('uptime').textContent=fmt(d.uptime||0);
      document.getElementById('pen').textContent=d.plugins_enabled||0;
      document.getElementById('ptot').textContent=d.plugins||0;
      document.getElementById('ver').textContent=d.version||'v1.1.0';
      var dot=document.getElementById('dot');
      dot.className='dot '+(d.status==='running'?'online':'offline');
      var ae=document.getElementById('adapters');ae.innerHTML='';
      (d.adapters||[]).forEach(function(a){
        var di=document.createElement('div');di.className='row';
        di.innerHTML='<span class="dot-sm '+a.status+'"></span><span style="flex:1">'+a.name+' ('+a.protocol+')</span><span class="chip '+(a.status==='connected'?'ok':'err')+'">'+a.status+'</span>';
        ae.appendChild(di);
      });
    });
    fetch('/api/metrics').then(function(r){return r.json()}).then(function(d){
      if(!d||!d.success)return;
      document.getElementById('mem').textContent=(d.process&&typeof d.process.memory_mb==='number'?d.process.memory_mb.toFixed(1)+' MB':'-- MB');
      document.getElementById('cpu').textContent=(d.process&&typeof d.process.cpu_percent==='number'?d.process.cpu_percent.toFixed(1)+'%':'--%');
      document.getElementById('tasks').textContent=(d.tasks?d.tasks.total:0);
    }).catch(function(){});
  }
  function initChart(){
    var ctx=document.getElementById('chart').getContext('2d');
    chart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[{label:'条/分钟',data:[],borderColor:'#D0BCFF',backgroundColor:'rgba(208,188,255,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,animation:false,scales:{x:{display:false},y:{beginAtZero:true,ticks:{color:'#CAC4D0'},grid:{color:'rgba(73,69,79,.5)'}}},plugins:{legend:{display:false}}}});
  }
  function updateChart(){
    if(!chart)return;
    fetch('/api/status').then(function(r){return r.json()}).then(function(d){
      var now=new Date().toLocaleTimeString();
      var total=0;
      (d.adapters||[]).forEach(function(a){total+=a.message_count||0});
      hist.push({t:now,v:total});
      if(hist.length>30)hist.shift();
      chart.data.labels=hist.map(function(d){return d.t});
      chart.data.datasets[0].data=hist.map(function(d){return d.v});
      chart.update('none');
    });
  }
  fetchStatus();setInterval(fetchStatus,3000);
  initChart();setInterval(updateChart,10000);
})();
</script></body></html>
