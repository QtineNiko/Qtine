<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 消息历史</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.btn.primary{background:var(--pc);color:var(--op);border-color:var(--pc)}.btn.primary:hover{filter:brightness(1.1)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-wrap:wrap}
.toolbar select,.toolbar input{padding:8px 12px;border-radius:var(--rad-s);border:1px solid var(--ol);background:var(--sfc);color:var(--on-s);font:400 13px/18px Roboto,sans-serif;outline:none;transition:border-color var(--tr)}
.toolbar select:focus,.toolbar input:focus{border-color:var(--p)}
.toolbar .spacer{flex:1}
.msg-list{flex:1;overflow-y:auto;padding:8px 16px}
.msg-item{padding:10px 14px;border-radius:var(--rad-m);margin-bottom:4px;transition:background var(--tr);display:flex;gap:10px}
.msg-item:hover{background:rgba(202,196,208,.06)}
.msg-item .avatar{width:36px;height:36px;border-radius:50%;background:var(--pc);color:var(--op);display:flex;align-items:center;justify-content:center;font:500 14px/20px Roboto,sans-serif;flex-shrink:0}
.msg-item .body{flex:1;min-width:0}
.msg-item .meta{font-size:11px;color:var(--on-sv);margin-bottom:2px;display:flex;gap:8px}
.msg-item .meta .name{color:var(--p);font-weight:500}
.msg-item .content{word-break:break-word;white-space:pre-wrap;font:400 14px/20px Roboto,sans-serif}
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#332D41;color:#F5EFF7;padding:12px 24px;border-radius:var(--rad-s);font:400 14px/20px Roboto,sans-serif;z-index:50;opacity:0;transition:all .4s var(--tr)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--on-sv);padding:60px 20px;font-size:14px}
.pager{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px;border-top:1px solid var(--olv);background:var(--sf)}
.pager span{font-size:12px;color:var(--on-sv)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.main{padding:0}}
</style></head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>消息</span></div>
  </div>
  <button class="btn" onclick="load()" style="margin-right:8px">刷新</button>
  <button class="btn danger" onclick="clearAll()">清空</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item active" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main">
    <div class="toolbar">
      <select id="group-select" onchange="load()">
        <option value="">全部会话</option>
      </select>
      <input type="text" id="search-input" placeholder="搜索消息内容..." style="flex:1;min-width:200px">
      <button class="btn primary" onclick="load()">搜索</button>
    </div>
    <div class="msg-list" id="msg-list"><div class="empty">加载中...</div></div>
    <div class="pager">
      <button class="btn" id="prev-btn" onclick="prevPage()">上一页</button>
      <span id="page-info">第 1 页</span>
      <button class="btn" id="next-btn" onclick="nextPage()">下一页</button>
    </div>
  </main>
</div>
<div class="snackbar" id="sb"></div>
<script>
(function(){
  var page = 0, pageSize = 50, hasMore = true;
  function toast(m){var s=document.getElementById('sb');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(function(){s.classList.remove('show')},3000)}
  function getGroup(){return document.getElementById('group-select').value}
  function getKeyword(){return document.getElementById('search-input').value.trim()}
  function formatTime(ts){
    var d = new Date(ts*1000);
    return d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function initials(name){
    if(!name)return '?';
    return name.charAt(0).toUpperCase();
  }
  function loadGroups(){
    fetch('/api/messages/groups').then(function(r){return r.json()}).then(function(d){
      var sel = document.getElementById('group-select');
      var current = sel.value;
      sel.innerHTML = '<option value="">全部会话</option>';
      (d.groups||[]).forEach(function(g){
        var name = g.group_id || '私聊';
        var opt = document.createElement('option');
        opt.value = g.group_id || '';
        opt.textContent = name + ' ('+g.count+')';
        sel.appendChild(opt);
      });
      sel.value = current;
    });
  }
  function load(){
    var list = document.getElementById('msg-list');
    var gid = getGroup();
    var kw = getKeyword();
    list.innerHTML = '<div class="empty">加载中...</div>';
    var url = '/api/messages?limit='+pageSize+'&offset='+(page*pageSize);
    if(gid)url += '&group_id='+encodeURIComponent(gid);
    if(kw)url += '&keyword='+encodeURIComponent(kw);
    fetch(url).then(function(r){return r.json()}).then(function(d){
      if(!d.success||!d.messages||!d.messages.length){
        list.innerHTML = '<div class="empty">暂无消息</div>';
        hasMore = false;
      }else{
        hasMore = d.messages.length >= pageSize;
        list.innerHTML = d.messages.map(function(m){
          var name = m.nickname || m.user_id;
          return '<div class="msg-item"><div class="avatar">'+initials(name)+'</div><div class="body"><div class="meta"><span class="name">'+escapeHtml(name)+'</span><span>ID: '+escapeHtml(m.user_id||'')+'</span><span>'+formatTime(m.timestamp)+'</span>'+(m.adapter?'<span>'+escapeHtml(m.adapter)+'</span>':'')+'</div><div class="content">'+escapeHtml(m.content)+'</div></div></div>';
        }).join('');
      }
      document.getElementById('page-info').textContent = '第 '+(page+1)+' 页';
      document.getElementById('prev-btn').disabled = page===0;
      document.getElementById('next-btn').disabled = !hasMore;
    });
  }
  function prevPage(){if(page>0){page--;load()}}
  function nextPage(){if(hasMore){page++;load()}}
  function clearAll(){
    if(!confirm('确定要清空所有消息历史吗？此操作不可撤销。'))return;
    var gid = getGroup();
    var body = gid ? JSON.stringify({group_id:gid}) : '{}';
    fetch('/api/messages/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:body}).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('已清空 '+d.cleared+' 条消息');page=0;load();loadGroups()}
    });
  }
  function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  window.clearAll = clearAll;
  window.prevPage = prevPage;
  window.nextPage = nextPage;
  loadGroups();
  load();
  setInterval(loadGroups, 15000);
})();
</script></body></html>
