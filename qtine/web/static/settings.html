<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 设置</title><style>
:root{--p:#D0BCFF;--sc:#4A4458;--e:#F2B8B5;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:18px;box-shadow:var(--elev1)}
.card h3{font:500 14px/20px Roboto,sans-serif;color:var(--on-sv);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--olv)}td:first-child{color:var(--on-sv);width:100px}
.token-box{display:flex;align-items:center;gap:8px;margin-top:8px}
.token-box code{font:var(--mono);color:var(--p);background:var(--sfc);padding:8px 12px;border-radius:var(--rad-s);flex:1;word-break:break-all;font-size:13px}
.copy-btn{padding:8px 16px;border-radius:var(--rad-f);font:500 13px/18px Roboto,sans-serif;border:1px solid var(--ol);background:transparent;color:var(--p);cursor:pointer;white-space:nowrap}
.copy-btn:hover{background:rgba(208,188,255,.08)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.main{padding:12px}}
</style></head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>设置</span></div>
  </div>
  <button class="btn" onclick="logout()">退出登录</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item active" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main">
    <div class="card">
      <h3>管理令牌</h3>
      <p style="font-size:13px;color:var(--on-sv);margin-bottom:8px">用于登录 WebUI 和调用 API。令牌存储在 <code style="color:var(--p)">data/token.txt</code>。</p>
      <div class="token-box">
        <code id="token">加载中...</code>
        <button class="copy-btn" onclick="copyToken()">复制</button>
        <button class="copy-btn" onclick="toggleToken()">显示/隐藏</button>
      </div>
    </div>
    <div class="card"><h3>全局管理员</h3><p style="font-size:13px;color:var(--on-sv);margin-bottom:8px">配置超级管理员QQ号，多个以逗号或换行分隔。管理员可使用 <code style="color:var(--p)">qtine</code> 系列命令。</p><textarea id="admins-ta" style="width:100%;height:100px;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol);border-radius:var(--rad-s);padding:10px;font-family:inherit;font-size:13px;resize:vertical;margin-bottom:8px" placeholder="例如：123456789, 987654321"></textarea><div style="display:flex;gap:8px"><button class="btn" onclick="saveAdmins()">保存</button><span id="admins-msg" style="font-size:13px;color:var(--on-sv);align-self:center"></span></div></div>
    <div class="card"><h3>服务器</h3><table id="srv-tbl"><tr><td>版本</td><td id="ver">--</td></tr><tr><td>设备</td><td id="dev">--</td></tr><tr><td>运行状态</td><td id="stat">--</td></tr><tr><td>运行时长</td><td id="up">--</td></tr></table></div>
    <div class="card"><h3>存储</h3><table><tr><td>后端</td><td>SQLite</td></tr><tr><td>路径</td><td>./data/qtine.db</td></tr></table></div>
    <div class="card"><h3>危险操作</h3><p style="font-size:13px;color:var(--on-sv);margin-bottom:12px">以下操作将影响正在运行的机器人进程。</p><div style="display:flex;gap:8px"><button class="btn danger" onclick="shutdown()">关闭机器人</button><button class="btn danger" onclick="restart()">重启机器人</button></div></div>
  </main>
</div>
<script>
(function(){
  function logout(){localStorage.removeItem('qtine_auth');location.href='/webui/login'}
  document.getElementById('dev').textContent=navigator.platform||'未知';
  var tokenVisible=false;
  var tokenVal='';
  function loadToken(){
    fetch('/api/token').then(function(r){
      if(r.status===401){logout();return}
      return r.json()
    }).then(function(d){
      if(!d)return;
      tokenVal=d.token||'';
      tokenVisible=false;
      document.getElementById('token').textContent=tokenVal.replace(/./g,'*');
    });
  }
  function loadStatus(){
    fetch('/api/status').then(function(r){return r.json()}).then(function(d){
      if(!d)return;
      document.getElementById('ver').textContent=d.version||'--';
      document.getElementById('stat').textContent=d.status==='running'?'运行中':'已停止';
      var s=d.uptime||0;
      var d2=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),se=Math.floor(s%60);
      document.getElementById('up').textContent=d2+'天 '+h+'时 '+m+'分 '+se+'秒';
    });
  }
  window.toggleToken=function(){
    tokenVisible=!tokenVisible;
    document.getElementById('token').textContent=tokenVisible?tokenVal:tokenVal.replace(/./g,'*');
  };
  window.copyToken=function(){
    navigator.clipboard.writeText(tokenVal).then(function(){alert('令牌已复制到剪贴板')});
  };
  window.shutdown=function(){if(confirm('确定要关闭机器人吗？需要手动重新启动。')){fetch('/api/shutdown',{method:'POST'});alert('关闭信号已发送。')}};
  window.restart=function(){if(confirm('确定要重启机器人吗？')){fetch('/api/restart',{method:'POST'});alert('重启信号已发送。')}};
  function loadAdmins(){
    fetch('/api/security/admins').then(function(r){
      if(r.status===401){logout();return}
      return r.json()
    }).then(function(d){
      if(!d)return;
      var ta=document.getElementById('admins-ta');
      ta.value=(d.admins||[]).join('\n');
    });
  }
  window.saveAdmins=function(){
    var ta=document.getElementById('admins-ta');
    var raw=ta.value||'';
    var list=raw.split(/[\n,，]/).map(function(s){return s.trim()}).filter(function(s){return s.length>0});
    fetch('/api/security/admins',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admins:list})}).then(function(r){return r.json()}).then(function(d){
      var msg=document.getElementById('admins-msg');
      if(d&&d.success){msg.textContent='已保存';ta.value=(d.admins||[]).join('\n');setTimeout(function(){msg.textContent=''},2000)}
      else{msg.textContent='保存失败：'+(d&&d.error?d.error:'未知错误')}
    });
  };
  loadToken();loadStatus();loadAdmins();setInterval(loadStatus,5000);
})();
</script></body></html>
