<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 插件管理</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.mono{font:var(--mono);color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:18px;box-shadow:var(--elev1)}
.card h3{font:500 16px/24px Roboto,sans-serif;margin-bottom:4px}
.card .meta{font-size:12px;color:var(--on-sv);margin-bottom:8px}
.card .actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 12px/16px Roboto,sans-serif;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol)}
.chip.ok{background:rgba(125,215,141,.15);color:var(--su)}.chip.err{background:rgba(242,184,181,.15);color:var(--e)}
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#332D41;color:#F5EFF7;padding:12px 24px;border-radius:var(--rad-s);font:400 14px/20px Roboto,sans-serif;z-index:50;opacity:0;transition:all .4s var(--tr)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-mask.show{display:flex}
.modal{background:var(--sf);border-radius:var(--rad-l);border:1px solid var(--olv);width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--olv);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font:500 20px/26px Roboto,sans-serif}
.modal-close{width:36px;height:36px;border-radius:var(--rad-f);border:none;background:transparent;color:var(--on-sv);cursor:pointer;font-size:20px;transition:background var(--tr)}
.modal-close:hover{background:rgba(202,196,208,.08)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--olv);display:flex;gap:10px;justify-content:flex-end}
.form-field{margin-bottom:18px}
.form-field label{display:block;font:500 13px/18px Roboto,sans-serif;color:var(--on-sv);margin-bottom:6px}
.form-field .hint{font-size:11px;color:var(--on-sv);margin-top:4px;opacity:.7}
.form-field input[type="text"],.form-field input[type="number"],.form-field input[type="password"],.form-field textarea,.form-field select{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--ol);background:var(--sfc);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;outline:none;transition:border-color var(--tr)}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--p)}
.form-field textarea{min-height:80px;resize:vertical;font-family:monospace}
.switch{position:relative;width:48px;height:26px;display:inline-block}
.switch input{display:none}
.switch-slider{position:absolute;inset:0;background:var(--olv);border-radius:var(--rad-f);cursor:pointer;transition:background var(--tr)}
.switch-slider::before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:transform var(--tr)}
.switch input:checked + .switch-slider{background:var(--pc)}
.switch input:checked + .switch-slider::before{transform:translateX(22px)}
.no-config{text-align:center;color:var(--on-sv);padding:20px 0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
<script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
</head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>插件</span></div>
  </div>
  <input type="file" id="file-input" accept=".zip" style="display:none" onchange="uploadPlugin(this)">
  <button class="btn" onclick="document.getElementById('file-input').click()" style="margin-right:8px">导入插件</button>
  <button class="btn" onclick="load()" style="margin-right:8px">刷新</button>
  <button class="btn" onclick="logout()">退出登录</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item active" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main"><div class="grid" id="grid"></div></main>
</div>
<div class="snackbar" id="sb"></div>
<div class="modal-mask" onclick="if(event.target===this)closeConfig()">
  <div class="modal">
    <div class="modal-header">
      <h2>插件配置</h2>
      <button class="modal-close" onclick="closeConfig()">✕</button>
    </div>
    <div class="modal-body">加载中...</div>
    <div class="modal-footer">
      <button class="btn" onclick="closeConfig()">取消</button>
      <button class="btn" onclick="saveConfig()" style="background:var(--pc);color:var(--op);border-color:var(--pc)">保存</button>
    </div>
  </div>
</div>
<script>
(function(){
  function logout(){localStorage.removeItem('qtine_auth');location.href='/webui/login'}
  function toast(m){var s=document.getElementById('sb');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(function(){s.classList.remove('show')},3000)}
  function load(){
    var g=document.getElementById('grid');
    qtineSkel('#grid',6);
    fetch('/api/plugins').then(function(r){return r.json()}).then(function(d){
      qtineSkelClear('#grid');
      (d||[]).forEach(function(p){
        var typeText = p.plugin_type==='builtin'?'内置':'外部';
        var statusText = p.enabled?'已启用':'已禁用';
        var c=document.createElement('div');c.className='card';
        c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:start"><div><h3>'+p.name+'</h3><p class="meta">v'+p.version+' - '+typeText+'</p><p style="margin-top:6px">'+(p.description||'')+'</p></div><span class="chip '+(p.enabled?'ok':'err')+'">'+statusText+'</span></div><div class="actions"><button class="btn" data-n="'+p.name+'" data-e="'+p.enabled+'" data-action="toggle">'+(p.enabled?'禁用':'启用')+'</button><button class="btn" data-n="'+p.name+'" data-action="config">配置</button><button class="btn" data-n="'+p.name+'" data-action="reload">重载</button>'+(p.plugin_type!=='builtin'?'<button class="btn danger" data-n="'+p.name+'" data-action="delete">卸载</button>':'')+'</div>';
        g.appendChild(c);
      });
    });
  }
  document.getElementById('grid').addEventListener('click',function(e){
    var b=e.target.closest('button');if(!b)return;
    var n=b.dataset.n,act=b.dataset.action;
    if(act==='toggle'){
      var ep=b.dataset.e==='true'?'disable':'enable';
      fetch('/api/plugins/'+n+'/'+ep,{method:'POST'}).then(function(){load();toast('插件 '+n+' 已'+(ep==='enable'?'启用':'禁用'))});
    }else if(act==='reload'){
      fetch('/api/plugins/'+n+'/reload',{method:'POST'}).then(function(){load();toast('插件 '+n+' 已重载')});
    }else if(act==='config'){
      openConfig(n);
    }else if(act==='delete'){
      if(confirm('确定要卸载 "'+n+'" 吗？此操作不可撤销。')){
        fetch('/api/plugins/'+n+'/uninstall',{method:'POST'}).then(function(){load();toast('插件 '+n+' 已卸载')});
      }
    }
  });
  window.uploadPlugin=function(input){
    var f=input.files[0];if(!f)return;
    var fd=new FormData();fd.append('file',f);
    toast('正在导入 '+f.name+' ...');
    fetch('/api/plugins/upload',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('插件 '+d.name+' 导入成功');load()}else{toast('导入失败: '+(d.error||'未知错误'))}
    }).catch(function(){toast('导入失败')});
    input.value='';
  };
  load();
  var _currentConfigPlugin = null;
  window.closeConfig=function(){
    document.querySelector('.modal-mask').classList.remove('show');
    _currentConfigPlugin = null;
  };
  window.saveConfig=function(){
    if(!_currentConfigPlugin)return;
    var inputs = document.querySelectorAll('.modal-body [data-key]');
    var values = {};
    inputs.forEach(function(el){
      var key = el.dataset.key;
      if(el.type==='checkbox'){values[key]=el.checked}
      else if(el.type==='number'){values[key]=parseFloat(el.value)||0}
      else{values[key]=el.value}
    });
    fetch('/api/plugins/'+_currentConfigPlugin+'/config',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({values:values})
    }).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('配置已保存');closeConfig()}
      else{toast('保存失败: '+(d.error||'未知错误'))}
    });
  };
  function openConfig(name){
    _currentConfigPlugin = name;
    fetch('/api/plugins/'+name+'/config').then(function(r){return r.json()}).then(function(d){
      if(!d.success){toast('加载配置失败: '+(d.error||'未知错误'));return}
      var body = document.querySelector('.modal-body');
      var titleEl = document.querySelector('.modal-header h2');
      titleEl.textContent = name + ' - 插件配置';
      if(!d.schema||!d.schema.length){
          body.innerHTML = '<div class="no-config">该插件暂无可配置项</div>';
          document.querySelector('.modal-footer .btn:nth-child(2)').style.display='none';
        }else{
          document.querySelector('.modal-footer .btn:nth-child(2)').style.display='';
          body.innerHTML = d.schema.map(function(item){
          var val = d.values[item.key];
          if(val===undefined||val===null) val = item.default;
          var field = '';
          if(item.type==='boolean'){
            field = '<label class="switch"><input type="checkbox" data-key="'+item.key+'" '+(val?'checked':'')+'><span class="switch-slider"></span></label>';
          }else if(item.type==='select'){
            field = '<select data-key="'+item.key+'">'+(item.options||[]).map(function(o){return '<option value="'+o.value+'" '+(val===o.value?'selected':'')+'>'+o.label+'</option>'}).join('')+'</select>';
          }else if(item.type==='textarea'){
            field = '<textarea data-key="'+item.key+'">'+escapeHtml(String(val||''))+'</textarea>';
          }else if(item.type==='number'){
            field = '<input type="number" data-key="'+item.key+'" value="'+val+'">';
          }else if(item.type==='password'){
            field = '<input type="password" data-key="'+item.key+'" value="'+escapeHtml(String(val||''))+'">';
          }else{
            field = '<input type="text" data-key="'+item.key+'" value="'+escapeHtml(String(val||''))+'">';
          }
          return '<div class="form-field"><label>'+item.label+'</label>'+field+(item.description?'<div class="hint">'+item.description+'</div>':'')+'</div>';
        }).join('');
      }
      document.querySelector('.modal-mask').classList.add('show');
    });
  }
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
})();
</script></body></html>
