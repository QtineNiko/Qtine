<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 定时任务</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.mono{font:var(--mono);color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.btn.primary{background:var(--pc);color:var(--op);border-color:var(--pc)}.btn.primary:hover{filter:brightness(1.1)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:18px;box-shadow:var(--elev1)}
.card h3{font:500 16px/24px Roboto,sans-serif;margin-bottom:4px}
.card .meta{font-size:12px;color:var(--on-sv);margin-bottom:8px}
.card .cron{font:var(--mono);background:var(--sfc);padding:4px 10px;border-radius:var(--rad-s);display:inline-block;margin-bottom:8px;border:1px solid var(--ol)}
.card .stats{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--on-sv)}
.card .actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 12px/16px Roboto,sans-serif;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol)}
.chip.ok{background:rgba(125,215,141,.15);color:var(--su)}.chip.err{background:rgba(242,184,181,.15);color:var(--e)}
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#332D41;color:#F5EFF7;padding:12px 24px;border-radius:var(--rad-s);font:400 14px/20px Roboto,sans-serif;z-index:50;opacity:0;transition:all .4s var(--tr)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-mask.show{display:flex}
.modal{background:var(--sf);border-radius:var(--rad-l);border:1px solid var(--olv);width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--olv);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font:500 20px/26px Roboto,sans-serif}
.modal-close{width:36px;height:36px;border-radius:var(--rad-f);border:none;background:transparent;color:var(--on-sv);cursor:pointer;font-size:20px;transition:background var(--tr)}
.modal-close:hover{background:rgba(202,196,208,.08)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--olv);display:flex;gap:10px;justify-content:flex-end}
.form-field{margin-bottom:18px}
.form-field label{display:block;font:500 13px/18px Roboto,sans-serif;color:var(--on-sv);margin-bottom:6px}
.form-field .hint{font-size:11px;color:var(--on-sv);margin-top:4px;opacity:.7}
.form-field input[type="text"],.form-field input[type="number"],.form-field input[type="password"],.form-field textarea,.form-field select{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--ol);background:var(--sfc);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;outline:none;transition:border-color var(--tr)}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--p)}
.form-field textarea{min-height:80px;resize:vertical;font-family:monospace}
.form-row{display:flex;gap:12px}
.form-row .form-field{flex:1}
.empty{text-align:center;color:var(--on-sv);padding:60px 20px;font-size:14px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
<script src="/static/theme.js"></script>

</head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>定时任务</span></div>
  </div>
  <button class="btn primary" onclick="openAddModal()" style="margin-right:8px">新建任务</button>
  <button class="btn" onclick="load()" style="margin-right:8px">刷新</button>
  <button class="btn" onclick="logout()">退出登录</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item active" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main">
    <div class="grid" id="grid">
    </div>
  </main>
</div>
<div class="snackbar" id="sb"></div>
<div class="modal-mask" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>新建定时任务</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>任务名称</label>
        <input type="text" id="task-name" placeholder="例如：每日早安问候">
      </div>
      <div class="form-field">
        <label>Cron 表达式</label>
        <input type="text" id="task-cron" placeholder="0 9 * * * （每天早上9点）">
        <div class="hint">格式：分 时 日 月 周（5个字段）。示例：*/30 * * * *（每30分钟）</div>
      </div>
      <div class="form-field">
        <label>任务描述</label>
        <input type="text" id="task-desc" placeholder="可选：任务说明">
      </div>
      <div class="form-field">
        <label>动作类型</label>
        <select id="task-action-type" onchange="toggleActionFields()">
          <option value="message">发送消息</option>
        </select>
      </div>
      <div id="message-fields">
        <div class="form-row">
          <div class="form-field">
            <label>目标类型</label>
            <select id="task-target-type">
              <option value="group">群聊</option>
              <option value="private">私聊</option>
            </select>
          </div>
          <div class="form-field">
            <label>目标 ID</label>
            <input type="text" id="task-target" placeholder="群号或QQ号">
          </div>
        </div>
        <div class="form-field">
          <label>消息内容</label>
          <textarea id="task-content" placeholder="要发送的消息内容"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAddModal()">取消</button>
      <button class="btn primary" onclick="addTask()">创建</button>
    </div>
  </div>
</div>
<script>
(function(){
  function checkAuth(r){
    if(r.status===401){localStorage.removeItem('qtine_auth');location.href='/webui/login';return Promise.reject(new Error('Unauthorized'))}
    return r;
  }
  function logout(){fetch('/api/logout',{method:'POST'}).finally(function(){localStorage.removeItem('qtine_auth');location.href='/webui/login'})}window.logout=logout
  function toast(m){var s=document.getElementById('sb');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(function(){s.classList.remove('show')},3000)}

  function formatTime(ts){
    if(!ts)return '从未';
    var d=new Date(ts*1000);
    return d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  function load(){
    document.getElementById('grid').innerHTML='<div class="empty">加载中...</div>';
    fetch('/api/tasks').then(checkAuth).then(function(r){return r.json()}).then(function(d){
      var g=document.getElementById('grid');
      var tasks=d.tasks||[];
      if(tasks.length===0){
        g.innerHTML='<div class="empty" style="grid-column:1/-1">暂无定时任务，点击右上角"新建任务"创建</div>';
        return;
      }
      tasks.forEach(function(t){
        var card=document.createElement('div');
        card.className='card';
        var pluginBadge=t.plugin?'<span class="chip">'+t.plugin+'</span>':'';
        card.innerHTML='<h3>'+escapeHtml(t.name)+'</h3>'
          +'<div class="meta">'+(t.description||'—')+'</div>'
          +'<div class="cron">'+escapeHtml(t.cron)+'</div>'
          +pluginBadge
          +'<div class="stats">'
          +'<span>运行次数: '+t.run_count+'</span>'
          +'<span>上次: '+formatTime(t.last_run)+'</span>'
          +'</div>'
          +'<div class="actions">'
          +'<button class="btn" onclick="runTask(\''+escapeJs(t.name)+'\')">立即运行</button>'
          +'<button class="btn danger" onclick="deleteTask(\''+escapeJs(t.name)+'\')">删除</button>'
          +'</div>';
        g.appendChild(card);
      });
    }).catch(function(e){toast('加载失败: '+e.message)});
  }window.load=load

  function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function escapeJs(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

  window.openAddModal=function(){document.getElementById('add-modal').classList.add('show')}
  window.closeAddModal=function(){document.getElementById('add-modal').classList.remove('show')}

  window.toggleActionFields=function(){
    var type=document.getElementById('task-action-type').value;
    document.getElementById('message-fields').style.display=type==='message'?'block':'none';
  }

  window.addTask=function(){
    var name=document.getElementById('task-name').value.trim();
    var cron=document.getElementById('task-cron').value.trim();
    var desc=document.getElementById('task-desc').value.trim();
    var actionType=document.getElementById('task-action-type').value;
    var targetType=document.getElementById('task-target-type').value;
    var target=document.getElementById('task-target').value.trim();
    var content=document.getElementById('task-content').value;

    if(!name||!cron){toast('请填写任务名称和 Cron 表达式');return}

    var data={
      name:name,cron:cron,description:desc,
      action_type:actionType,
      action_data:{target_type:targetType,target:target,content:content}
    };

    fetch('/api/tasks',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    }).then(checkAuth).then(function(r){return r.json()}).then(function(d){
      if(d.success){
        toast('任务创建成功');
        closeAddModal();
        load();
        document.getElementById('task-name').value='';
        document.getElementById('task-cron').value='';
        document.getElementById('task-desc').value='';
        document.getElementById('task-target').value='';
        document.getElementById('task-content').value='';
      }else{
        toast('创建失败: '+d.error);
      }
    }).catch(function(e){toast('请求失败: '+e.message)});
  }

  window.deleteTask=function(name){
    if(!confirm('确定要删除任务 "'+name+'" 吗？'))return;
    fetch('/api/tasks/'+encodeURIComponent(name),{method:'DELETE'})
      .then(checkAuth).then(function(r){return r.json()}).then(function(d){
        if(d.success){toast('任务已删除');load()}
        else{toast('删除失败')}
      }).catch(function(e){toast('请求失败: '+e.message)});
  }

  window.runTask=function(name){
    fetch('/api/tasks/'+encodeURIComponent(name)+'/run',{method:'POST'})
      .then(checkAuth).then(function(r){return r.json()}).then(function(d){
        if(d.success){toast('任务已触发')}
        else{toast('触发失败: '+d.error)}
      }).catch(function(e){toast('请求失败: '+e.message)});
  }

  load();
})();
</script>
</body></html>
