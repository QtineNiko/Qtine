<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 适配器</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.primary{background:var(--p);color:var(--op);border-color:transparent}
.btn.primary:hover{background:#E9DDFF}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.btn.success{color:var(--su);border-color:var(--su)}.btn.success:hover{background:rgba(125,215,141,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:18px;box-shadow:var(--elev1);display:flex;flex-direction:column;gap:10px}
.card .head{display:flex;align-items:center;gap:12px}
.card .icon{width:44px;height:44px;border-radius:var(--rad-s);background:var(--pc);color:#EADDFF;display:flex;align-items:center;justify-content:center;font:500 20px/24px Roboto,sans-serif;flex-shrink:0;text-transform:uppercase}
.card h3{font:500 16px/24px Roboto,sans-serif}
.card .meta{font-size:12px;color:var(--on-sv)}
.card .remark{font-size:11px;color:var(--on-sv);font-style:italic}
table{width:100%;border-collapse:collapse}
td{padding:6px 8px;font-size:13px;border-bottom:1px solid var(--olv)}td:first-child{color:var(--on-sv);width:90px}
.empty{padding:48px 16px;text-align:center;color:var(--on-sv)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeInUp .35s ease-out both}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 12px/16px Roboto,sans-serif;border:1px solid var(--ol)}
.chip.ok{background:rgba(125,215,141,.15);color:var(--su)}.chip.err{background:rgba(242,184,181,.15);color:var(--e)}.chip.warn{background:rgba(255,217,112,.15);color:var(--w)}.chip.disabled{background:rgba(202,196,208,.08);color:var(--on-sv)}
.mono{font:var(--mono)}
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#332D41;color:#F5EFF7;padding:12px 24px;border-radius:var(--rad-s);font:400 14px/20px Roboto,sans-serif;z-index:50;opacity:0;transition:all .4s var(--tr)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toggle{position:relative;width:44px;height:24px;border-radius:var(--rad-f);background:var(--olv);cursor:pointer;transition:background var(--tr);flex-shrink:0}
.toggle.on{background:var(--p)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--on-s);transition:transform var(--tr)}
.toggle.on::after{transform:translateX(20px)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60}
.modal.show{display:flex}
.modal-content{background:var(--sf);border:1px solid var(--olv);border-radius:var(--rad-l);padding:24px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-content h2{font:500 18px/28px Roboto,sans-serif;margin-bottom:4px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font:500 12px/16px Roboto,sans-serif;color:var(--on-sv);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{padding:10px 12px;border-radius:var(--rad-s);border:1px solid var(--olv);background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;outline:none;transition:border var(--tr)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p)}
.field textarea{resize:vertical;min-height:80px}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
<script src="/static/theme.js"></script>
</head><body>
<header class="top-bar">
  <div style="display:flex;align-items:center;flex:1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--p)"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <div class="brand">Qtine <span>适配器</span></div>
  </div>
  <button class="btn primary" onclick="showCreateModal()" style="margin-right:8px">+ 新建适配器</button>
  <input type="file" id="file-input" accept=".zip" style="display:none" onchange="uploadAdapter(this)">
  <button class="btn" onclick="document.getElementById('file-input').click()" style="margin-right:8px">导入</button>
  <button class="btn" onclick="load()" style="margin-right:8px">刷新</button>
  <button class="btn" onclick="logout()">退出登录</button>
</header>
<div class="layout">
  <nav class="nav">
    <a class="nav-item" href="/webui/dashboard"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>仪表盘</a>
    <a class="nav-item" href="/webui/plugins"><svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>插件</a>
    <a class="nav-item" href="/webui/market"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>市场</a>
    <a class="nav-item active" href="/webui/adapters"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>适配器</a>
    <a class="nav-item" href="/webui/tasks"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>任务</a>
    <a class="nav-item" href="/webui/messages"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>消息</a>
    <a class="nav-item" href="/webui/logs"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>日志</a>
    <a class="nav-item" href="/webui/settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.484.484 0 00-.48-.31h-3.84a.49.49 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.485.485 0 00-.59.22L2.72 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.08.19.26.31.48.31h3.84a.48.48 0 00.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.484.484 0 00-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>设置</a>
    <a class="nav-item" href="/webui/about"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>关于</a>
    <div class="nav-spacer"></div>
  </nav>
  <main class="main"><div class="grid" id="grid"></div></main>
</div>
<div class="snackbar" id="sb"></div>
<div class="modal" id="create-modal">
  <div class="modal-content">
    <h2>新建适配器</h2>
    <div class="field">
      <label>协议</label>
      <select id="c-protocol"><option value="">选择协议...</option></select>
    </div>
    <div class="field">
      <label>名称</label>
      <input id="c-name" placeholder="适配器名称">
    </div>
    <div class="field">
      <label>Token / API Key</label>
      <input id="c-token" placeholder="通信密钥">
    </div>
    <div class="field">
      <label>WebSocket 端口</label>
      <input id="c-port" type="number" placeholder="0（自动分配）">
    </div>
    <div class="field">
      <label>备注</label>
      <input id="c-remark" placeholder="可选备注">
    </div>
    <div class="actions">
      <button class="btn" onclick="hideCreateModal()">取消</button>
      <button class="btn primary" onclick="createAdapter()">创建</button>
    </div>
  </div>
</div>
<div class="modal" id="edit-modal">
  <div class="modal-content">
    <h2 id="e-title">编辑适配器</h2>
    <div class="field">
      <label>Token / API Key</label>
      <input id="e-token" placeholder="通信密钥">
    </div>
    <div class="field">
      <label>WebSocket 端口</label>
      <input id="e-port" type="number" placeholder="0">
    </div>
    <div class="field">
      <label>备注</label>
      <input id="e-remark" placeholder="备注">
    </div>
    <div class="field">
      <label>额外配置 (JSON)</label>
      <textarea id="e-config" placeholder='{"key":"value"}'></textarea>
    </div>
    <div class="actions">
      <button class="btn" onclick="hideEditModal()">取消</button>
      <button class="btn primary" onclick="updateAdapter()">保存</button>
    </div>
  </div>
</div>
<script>
(function(){
  function logout(){fetch('/api/logout',{method:'POST'}).finally(function(){localStorage.removeItem('qtine_auth');location.href='/webui/login'})}
  window.logout=logout;
  function toast(m){var s=document.getElementById('sb');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(function(){s.classList.remove('show')},3000)}
  var editingName='';
  function load(){
    fetch('/api/adapters').then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){
      if(!d)return;
      var g=document.getElementById('grid');g.innerHTML='';
      var statusMap={connected:'已连接',disconnected:'已断开',connecting:'连接中',error:'错误'};
      (d||[]).forEach(function(a){
        var c=document.createElement('div');c.className='card';
        var chipClass=a.enabled?(a.status==='connected'?'ok':a.status==='connecting'?'warn':'err'):'disabled';
        var chipText=a.enabled?(statusMap[a.status]||a.status):'已禁用';
        var btns=[];
        if(a.enabled){
          if(a.status==='connected'){btns.push('<button class="btn" onclick="reconnect(\''+a.name+'\')">重连</button>');btns.push('<button class="btn" onclick="stop(\''+a.name+'\')">停止</button>');btns.push('<button class="btn" onclick="disable(\''+a.name+'\')">禁用</button>')}
          else{btns.push('<button class="btn success" onclick="start(\''+a.name+'\')">启动</button>');btns.push('<button class="btn" onclick="disable(\''+a.name+'\')">禁用</button>')}
        }else{
          btns.push('<button class="btn" onclick="enable(\''+a.name+'\')">启用</button>');
        }
        btns.push('<button class="btn" onclick="edit(\''+a.name+'\')">编辑</button>');
        btns.push('<button class="btn danger" onclick="remove(\''+a.name+'\')">删除</button>');
        c.innerHTML='<div class="head"><div class="icon">'+(a.protocol||'?').charAt(0).toUpperCase()+'</div><div style="flex:1"><h3>'+a.name+(a.builtin?'':' <span style="font-size:11px;color:var(--p)">外部</span>')+'</h3><p class="meta">'+(a.nickname||a.protocol)+'</p>'+(a.remark?'<p class="remark">'+a.remark+'</p>':'')+'</div><span class="chip '+chipClass+'">'+chipText+'</span></div><table><tr><td>协议</td><td>'+a.protocol+'</td></tr><tr><td>账号</td><td class="mono">'+(a.account_id||'--')+'</td></tr><tr><td>消息数</td><td>'+(a.message_count||0)+' 收 / '+(a.sent_count||0)+' 发</td></tr><tr><td>错误数</td><td>'+(a.error_count||0)+'</td></tr>'+(a.ws_port?'<tr><td>WS端口</td><td>'+a.ws_port+'</td></tr>':'')+'</table><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'+btns.join('')+'</div>';
        g.appendChild(c);
      });
    });
  }
  function start(name){fetch('/api/adapters/'+name+'/start',{method:'POST'}).then(function(r){if(r.status===401){logout();return}load();toast('正在启动 '+name+'...')})}
  function stop(name){fetch('/api/adapters/'+name+'/stop',{method:'POST'}).then(function(r){if(r.status===401){logout();return}load();toast('已停止 '+name)})}
  function enable(name){fetch('/api/adapters/'+name+'/enable',{method:'POST'}).then(function(r){if(r.status===401){logout();return}load();toast('已启用 '+name)})}
  function disable(name){fetch('/api/adapters/'+name+'/disable',{method:'POST'}).then(function(r){if(r.status===401){logout();return}load();toast('已禁用 '+name)})}
  function remove(name){if(!confirm('确定要删除适配器 '+name+' 吗？'))return;fetch('/api/adapters/'+name,{method:'DELETE'}).then(function(r){if(r.status===401){logout();return}load();toast('已删除 '+name)})}
  function reconnect(name){fetch('/api/adapters/'+name+'/reconnect',{method:'POST'}).then(function(r){if(r.status===401){logout();return}load();toast('正在重连 '+name+'...')})}
  function showCreateModal(){document.getElementById('create-modal').classList.add('show');fetch('/api/adapters/protocols').then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(!d)return;var s=document.getElementById('c-protocol');s.innerHTML='<option value="">选择协议...</option>';(d||[]).forEach(function(p){s.innerHTML+='<option value="'+p.protocol+'">'+p.name+'</option>'})})}
  function hideCreateModal(){document.getElementById('create-modal').classList.remove('show')}
  function createAdapter(){var protocol=document.getElementById('c-protocol').value,name=document.getElementById('c-name').value;if(!protocol||!name){toast('请填写协议和名称');return}fetch('/api/adapters',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({protocol:protocol,name:name,token:document.getElementById('c-token').value,ws_port:parseInt(document.getElementById('c-port').value)||0,remark:document.getElementById('c-remark').value,config:{}})}).then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(!d)return;if(d.success){hideCreateModal();load();toast('适配器 '+name+' 创建成功')}else{toast('创建失败: '+(d.error||'未知错误'))}})}
  function edit(name){editingName=name;fetch('/api/adapters').then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(!d)return;var a=(d||[]).find(function(x){return x.name===name});if(!a)return;document.getElementById('e-title').textContent='编辑适配器: '+name;document.getElementById('e-token').value='';document.getElementById('e-port').value=a.ws_port||'';document.getElementById('e-remark').value=a.remark||'';document.getElementById('e-config').value=JSON.stringify(a.config||{},null,2);document.getElementById('edit-modal').classList.add('show')})}
  function hideEditModal(){document.getElementById('edit-modal').classList.remove('show')}
  function updateAdapter(){var config={};try{config=JSON.parse(document.getElementById('e-config').value||'{}')}catch(e){toast('JSON配置格式错误');return}fetch('/api/adapters/'+editingName+'/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:document.getElementById('e-token').value,ws_port:parseInt(document.getElementById('e-port').value)||0,remark:document.getElementById('e-remark').value,config:config})}).then(function(r){if(r.status===401){logout();return}hideEditModal();load();toast('配置已更新')})}
  function uploadAdapter(input){var f=input.files[0];if(!f)return;var fd=new FormData();fd.append('file',f);toast('正在导入 '+f.name+' ...');fetch('/api/adapters/upload',{method:'POST',body:fd}).then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(!d)return;if(d.success){toast('适配器 '+d.name+' 导入成功');load()}else{toast('导入失败: '+(d.error||'未知错误'))}}).catch(function(){toast('导入失败')});input.value=''}
  window.load=load;
  window.start=start;
  window.stop=stop;
  window.enable=enable;
  window.disable=disable;
  window.remove=remove;
  window.reconnect=reconnect;
  window.showCreateModal=showCreateModal;
  window.hideCreateModal=hideCreateModal;
  window.createAdapter=createAdapter;
  window.edit=edit;
  window.hideEditModal=hideEditModal;
  window.updateAdapter=updateAdapter;
  window.uploadAdapter=uploadAdapter;
  document.getElementById('create-modal').addEventListener('click',function(e){if(e.target===this)hideCreateModal()});
  document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)hideEditModal()});
  load();
})();
</script></body></html>
