<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#141218"><title>Qtine 插件市场</title><style>
:root{--p:#D0BCFF;--op:#381E72;--pc:#4F378B;--sc:#4A4458;--e:#F2B8B5;--su:#7DD78D;--w:#FFD970;--bg:#141218;--sf:#211F26;--sfc:#2B2930;--on-s:#E6E1E5;--on-sv:#CAC4D0;--ol:#938F99;--olv:#49454F;--rad-s:8px;--rad-m:12px;--rad-l:16px;--rad-f:9999px;--elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);--tr:200ms cubic-bezier(.2,0,0,1);--mono:400 13px/20px 'Roboto Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.top-bar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--sf);border-bottom:1px solid var(--olv);flex-shrink:0}
.top-bar .brand{font:400 22px/28px Roboto,sans-serif;flex:1;margin-left:12px}
.top-bar .brand span{color:var(--p)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:var(--rad-f);font:500 14px/20px Roboto,sans-serif;border:1px solid var(--ol);cursor:pointer;transition:all var(--tr);background:transparent;color:var(--p)}
.btn:hover{background:rgba(208,188,255,.08)}
.btn.danger{color:var(--e);border-color:var(--e)}.btn.danger:hover{background:rgba(242,184,181,.08)}
.btn.primary{background:var(--p);color:var(--op);border-color:transparent}
.btn.primary:hover{background:#E9DDFF}
.btn:disabled{opacity:.5;cursor:not-allowed}
.layout{display:flex;flex:1;overflow:hidden}
.nav{width:72px;background:var(--sf);border-right:1px solid var(--olv);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:2px;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:60px;padding:10px 2px;border:none;border-radius:var(--rad-l);background:transparent;color:var(--on-sv);cursor:pointer;font:500 11px/16px Roboto,sans-serif;transition:all var(--tr);text-align:center;text-decoration:none}
.nav-item:hover{background:rgba(202,196,208,.08)}
.nav-item.active{background:var(--sc);color:#E8DEF8}
.nav-item svg{width:22px;height:22px;fill:currentColor}
.nav-spacer{flex:1}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.source-bar{display:flex;flex-direction:column;gap:8px;background:var(--sf);border:1px solid var(--olv);border-radius:var(--rad-m);padding:12px 16px}
.source-bar .row{display:flex;align-items:center;gap:10px}
.source-bar .label{font:500 13px/18px Roboto,sans-serif;color:var(--on-sv);white-space:nowrap}
.source-bar .url{font:var(--mono);color:var(--p);flex:1;word-break:break-all;font-size:13px}
.source-bar .chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 11px/16px Roboto,sans-serif;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol)}
.source-bar .chip.ok{background:rgba(125,215,141,.15);color:var(--su)}
.source-bar .chip.warn{background:rgba(255,217,112,.15);color:var(--w)}
.source-bar .chip.primary{background:rgba(208,188,255,.15);color:var(--p)}
.source-bar .divider{border-top:1px solid var(--olv);margin:0 -4px}
.source-bar .mirror-item{font-size:12px;color:var(--on-sv);font-family:var(--mono);padding:2px 8px;background:var(--sfc);border-radius:var(--rad-s);border:1px solid var(--ol);margin-right:4px;display:inline-block}
.mirror-empty{font-size:12px;color:var(--ol);font-style:italic}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 14px;border-radius:var(--rad-f);border:1px solid var(--ol);background:var(--sf);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;outline:none}
.toolbar input[type=text]:focus{border-color:var(--p)}
.toolbar input[type=text]::placeholder{color:var(--ol)}
.sort-select{padding:8px 14px;border-radius:var(--rad-f);border:1px solid var(--ol);background:var(--sf);color:var(--on-s);font-size:13px;outline:none;cursor:pointer}
.sort-select:focus{border-color:var(--p)}
.tag-filter{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-btn{padding:4px 12px;border-radius:var(--rad-f);font:500 12px/16px Roboto,sans-serif;border:1px solid var(--ol);background:transparent;color:var(--on-sv);cursor:pointer;transition:all var(--tr);position:relative}
.tag-btn:hover{background:rgba(202,196,208,.08)}
.tag-btn.active{background:var(--sc);color:#E8DEF8;border-color:transparent}
.tag-btn .count{font-size:10px;opacity:.7;margin-left:2px}
.tag-local{color:var(--p)!important;border-color:var(--p)!important}
.tag-local.active{background:var(--p);color:var(--op)!important}
.result-count{font-size:12px;color:var(--on-sv);margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--sf);border-radius:var(--rad-m);border:1px solid var(--olv);padding:18px;box-shadow:var(--elev1);display:flex;flex-direction:column;gap:8px}
.card .head{display:flex;align-items:start;gap:12px}
.card .icon{width:44px;height:44px;border-radius:var(--rad-s);background:var(--pc);color:#EADDFF;display:flex;align-items:center;justify-content:center;font:500 20px/24px Roboto,sans-serif;flex-shrink:0;text-transform:uppercase}
.card h3{font:500 16px/24px Roboto,sans-serif}
.card .meta{font-size:12px;color:var(--on-sv);margin-top:2px}
.card .desc{font-size:13px;color:var(--on-s);min-height:40px;line-height:1.5}
.card .tags{display:flex;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--rad-s);font:500 11px/16px Roboto,sans-serif;background:var(--sfc);color:var(--on-s);border:1px solid var(--ol)}
.card .footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding-top:12px;border-top:1px solid var(--olv)}
.card .stats{font-size:12px;color:var(--on-sv);display:flex;gap:12px}
.card .stats span{display:inline-flex;align-items:center;gap:4px}
.card .actions{display:flex;gap:6px}
.empty{padding:48px 16px;text-align:center;color:var(--on-sv)}
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#332D41;color:#F5EFF7;padding:12px 24px;border-radius:var(--rad-s);font:400 14px/20px Roboto,sans-serif;z-index:50;opacity:0;transition:all .4s var(--tr)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60}
.modal.show{display:flex}
.modal .box{background:var(--sf);border:1px solid var(--olv);border-radius:var(--rad-l);padding:24px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:80vh;overflow-y:auto}
.modal .box.wide{max-width:720px}
.modal h3{font:500 18px/24px Roboto,sans-serif}
.modal p{font-size:13px;color:var(--on-sv);line-height:1.6}
.modal input{padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--ol);background:var(--sfc);color:var(--on-s);font:400 14px/20px Roboto,sans-serif;outline:none}
.modal input:focus{border-color:var(--p)}
.modal .actions{display:flex;justify-content:flex-end;gap:8px}
.mirror-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.mirror-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--rad-s);background:var(--sfc);border:1px solid var(--ol);cursor:pointer;transition:all var(--tr)}
.mirror-item:hover{border-color:var(--p)}
.mirror-item.active{border-color:var(--p);background:rgba(208,188,255,.1)}
.mirror-item .name{flex:1;font-size:13px}
.mirror-item .url{font-size:11px;color:var(--on-sv);font-family:var(--mono)}
.mirror-item .lat{font-size:12px;color:var(--on-sv)}
.mirror-item .lat.fast{color:var(--su)}
.mirror-item .lat.slow{color:var(--e)}
.detail-head{display:flex;gap:14px;align-items:flex-start}
.detail-head .icon{width:56px;height:56px;border-radius:var(--rad-s);background:var(--pc);color:#EADDFF;display:flex;align-items:center;justify-content:center;font:500 24px/28px Roboto,sans-serif;flex-shrink:0;text-transform:uppercase}
.detail-head h2{font:500 20px/28px Roboto,sans-serif}
.detail-head .meta{font-size:12px;color:var(--on-sv);margin-top:4px}
.readme-box{background:var(--sfc);border:1px solid var(--ol);border-radius:var(--rad-s);padding:16px;max-height:400px;overflow-y:auto;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.readme-box h1,.readme-box h2,.readme-box h3{margin-top:12px;margin-bottom:8px}
.readme-box code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px}
.readme-box pre{background:var(--bg);padding:12px;border-radius:var(--rad-s);overflow-x:auto}
.readme-box a{color:var(--p)}
.mirror-bar{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--olv);border-radius:var(--rad-m);padding:10px 16px}
.mirror-bar .label{font:500 13px/18px Roboto,sans-serif;color:var(--on-sv);flex-shrink:0}
.mirror-bar .current{flex:1;font-size:13px;color:var(--on-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mirror-bar .current .name{color:var(--p);font-weight:500}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--olv);border-radius:3px}
@media(max-width:768px){.nav{width:56px}.nav-item{width:48px;padding:8px 1px;font-size:10px}.grid{grid-template-columns:1fr}.main{padding:12px}}
</style><script src="/static/theme.js"></script></head><body>

<script>
(function(){
  var ALL_PLUGINS=[];
  var ALL_TAGS=[];
  var ACTIVE_TAGS=[];  // 多选标签
  var KEYWORD='';
  var MIRRORS=[];
  var CURRENT_MIRROR='';
  var FASTEST_MIRROR='';
  var DETAIL_PLUGIN=null;

  function logout(){localStorage.removeItem('qtine_auth');location.href='/webui/login'}
  function toast(m){var s=document.getElementById('sb');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(function(){s.classList.remove('show')},3000)}
  window.logout=logout;
  window.toast=toast;

  function load(){
    fetch('/api/market/plugins').then(function(r){
      if(r.status===401){logout();return}
      return r.json()
    }).then(function(d){
      if(!d)return;
      var url=document.getElementById('src-url');
      var chip=document.getElementById('src-chip');
      url.textContent=d.source||'（未配置，使用内置示例）';
      if(d.using_fallback){
        chip.textContent='默认插件源';
        chip.className='chip warn';
      }else{
        chip.textContent='已连接源';
        chip.className='chip ok';
      }
      // 展示镜像源
      var divider=document.getElementById('src-divider');
      var mirrorRow=document.getElementById('src-mirror-row');
      var mirrorSpan=document.getElementById('src-mirrors');
      var mirrors=d.mirrors||[];
      if(mirrors.length>0){
        divider.style.display='';
        mirrorRow.style.display='';
        mirrorSpan.innerHTML=mirrors.map(function(m, i){
          var label=m.name||m.url||m;
          var u=(typeof m==='string')?m:(m.url||'');
          return '<span class="mirror-item" title="'+u+'">'+(label||u)+'</span>';
        }).join('');
      }else{
        divider.style.display='none';
        mirrorRow.style.display='none';
        mirrorSpan.innerHTML='<span class="mirror-empty">无</span>';
      }
      ALL_PLUGINS=(d.plugins||[]).map(function(p){
        p._tags=(p.tags||[]).slice();
        return p;
      });
      var tagSet={};
      ALL_PLUGINS.forEach(function(p){(p._tags||[]).forEach(function(t){tagSet[t]=1})});
      ALL_TAGS=Object.keys(tagSet).sort();
      renderTags();
      render();
    }).catch(function(){toast('加载失败')});
    loadMirrors();
  }

  function loadMirrors(){
    fetch('/api/market/mirrors').then(function(r){return r.json()}).then(function(d){
      MIRRORS=d.mirrors||[];
      CURRENT_MIRROR=d.current||'';
      renderMirrorBar();
    }).catch(function(){});
  }

  function renderMirrorBar(){
    var el=document.getElementById('mirror-current');
    var cur=MIRRORS.find(function(m){return m.url===CURRENT_MIRROR});
    var name=cur?cur.name:CURRENT_MIRROR;
    el.innerHTML='<span class="name">'+name+'</span> <span style="font-size:11px;color:var(--on-sv);font-family:var(--mono)">'+(CURRENT_MIRROR||'')+'</span>';
  }

  function renderTags(){
    var box=document.getElementById('tag-filter');
    box.innerHTML='';
    // 计算每个标签的插件数
    var tagCounts={};
    ALL_TAGS.forEach(function(t){tagCounts[t]=0});
    ALL_PLUGINS.forEach(function(p){(p._tags||[]).forEach(function(t){
      if(tagCounts[t]!=null)tagCounts[t]++;
    })});
    // "全部"按钮
    var all=document.createElement('button');
    all.className='tag-btn'+(ACTIVE_TAGS.length===0?' active':'');
    all.textContent='全部 ('+ALL_PLUGINS.length+')';
    all.onclick=function(){ACTIVE_TAGS=[];renderTags();render()};
    box.appendChild(all);
    // 所有标签
    ALL_TAGS.forEach(function(t){
      var b=document.createElement('button');
      b.className='tag-btn'+(ACTIVE_TAGS.indexOf(t)>=0?' active':'');
      b.innerHTML=t+' <span class="count">'+tagCounts[t]+'</span>';
      b.onclick=function(){toggleTag(t);renderTags();render()};
      box.appendChild(b);
    });
  }
  function toggleTag(t){
    var idx=ACTIVE_TAGS.indexOf(t);
    if(idx>=0){ACTIVE_TAGS.splice(idx,1)}
    else{ACTIVE_TAGS.push(t)}
  }

  function render(){
    KEYWORD=(document.getElementById('search').value||'').toLowerCase().trim();
    var sortBy=document.getElementById('sort-by').value;
    var grid=document.getElementById('grid');
    grid.innerHTML='';
    var list=ALL_PLUGINS.filter(function(p){
      // 多选标签：插件必须包含所有选中的标签
      if(ACTIVE_TAGS.length>0){
        for(var i=0;i<ACTIVE_TAGS.length;i++){
          if((p._tags||[]).indexOf(ACTIVE_TAGS[i])<0)return false;
        }
      }
      if(KEYWORD){
        var blob=(p.name+' '+(p.author||'')+' '+(p.description||'')+' '+(p._tags||[]).join(' ')).toLowerCase();
        if(blob.indexOf(KEYWORD)<0)return false;
      }
      return true;
    });
    // 排序
    if(sortBy==='name'){
      list.sort(function(a,b){return (a.name||'').localeCompare(b.name||'')});
    }else if(sortBy==='downloads'){
      list.sort(function(a,b){return (b.downloads||0)-(a.downloads||0)});
    }else if(sortBy==='version'){
      list.sort(function(a,b){
        var va=(a.version||'0').split('.').map(Number);
        var vb=(b.version||'0').split('.').map(Number);
        for(var i=0;i<Math.max(va.length,vb.length);i++){
          if((va[i]||0)!==(vb[i]||0))return (vb[i]||0)-(va[i]||0);
        }
        return 0;
      });
    }
    // 显示数量
    document.getElementById('result-count').textContent='共 '+list.length+' 个插件';
    if(list.length===0){
      grid.innerHTML='<div class="empty">没有匹配的插件</div>';
      return;
    }
    list.forEach(function(p){
      var c=document.createElement('div');c.className='card';c.style.cursor='pointer';
      var initial=(p.name||'?').charAt(0).toUpperCase();
      var tagsHtml=(p._tags||[]).map(function(t){return '<span class="chip">'+t+'</span>'}).join('');
      var dl=p.downloads||0;
      var dlText=dl>=1000?(dl/1000).toFixed(1)+'k':String(dl);
      var isLocal=p.is_local;
      var btnHtml;
      if(p.installed){
        btnHtml='<button class="btn" disabled>'+(isLocal?'本地已安装':'已安装')+'</button>';
        if(isLocal){
          btnHtml+='<button class="btn danger" data-name="'+p.name+'" data-action="uninstall" style="padding:4px 10px;font-size:12px">卸载</button>';
        }
      }else{
        btnHtml='<button class="btn primary" data-name="'+p.name+'" data-action="install">安装</button>';
      }
      c.innerHTML=
        '<div class="head"><div class="icon">'+initial+'</div>'+
        '<div style="flex:1"><h3>'+(p.name||'')+(isLocal?' <span style="font-size:11px;color:var(--p);font-weight:400">（本地）</span>':'')+'</h3>'+
        '<div class="meta">v'+(p.version||'?')+' · '+(p.author||'未知')+(p.size?' · '+p.size:'')+'</div></div></div>'+
        '<div class="desc">'+(p.description||'（无描述）')+'</div>'+
        '<div class="tags">'+tagsHtml+'</div>'+
        '<div class="footer"><div class="stats"><span title="下载量">↓ '+dlText+'</span>'+
        (p.homepage?'<a href="'+p.homepage+'" target="_blank" style="color:var(--p);text-decoration:none;font-size:12px" onclick="event.stopPropagation()">主页 →</a>':'')+
        '</div><div class="actions">'+btnHtml+'</div></div>';
      c.addEventListener('click',function(e){
        if(e.target.closest('button')||e.target.closest('a'))return;
        openDetail(p);
      });
      grid.appendChild(c);
    });
  }

  document.getElementById('grid').addEventListener('click',function(e){
    var b=e.target.closest('button');if(!b||!b.dataset.action)return;
    if(b.dataset.action==='install'){
      var name=b.dataset.name;
      startInstall(name,b);
    }else if(b.dataset.action==='uninstall'){
      var name=b.dataset.name;
      if(!confirm('确定要卸载 "'+name+'" 吗？'))return;
      b.disabled=true;b.textContent='卸载中...';
      fetch('/api/plugins/'+encodeURIComponent(name)+'/uninstall',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
        if(d&&d.success){toast('插件 '+name+' 已卸载');load()}
        else{toast('卸载失败: '+(d&&d.error?d.error:'未知错误'));b.disabled=false;b.textContent='卸载'}
      }).catch(function(){toast('卸载失败');b.disabled=false;b.textContent='卸载'});
    }
  });

  // 安装流程：先选加速源，再下载
  var PENDING_INSTALL=null;  // {name, btn}
  function startInstall(name,btn){
    PENDING_INSTALL={name:name,btn:btn};
    // 打开加速源选择弹窗
    loadMirrors();
    renderMirrorList();
    document.getElementById('mirror-modal').classList.add('show');
  }

  function doInstall(){
    if(!PENDING_INSTALL)return;
    var name=PENDING_INSTALL.name;
    var b=PENDING_INSTALL.btn;
    document.getElementById('mirror-modal').classList.remove('show');
    if(!confirm('确定要安装 "'+name+'" 吗？')){PENDING_INSTALL=null;return}
    b.disabled=true;b.textContent='安装中...';
    toast('正在安装 '+name+' ...');
    fetch('/api/market/install/'+encodeURIComponent(name),{method:'POST'}).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('插件 '+d.name+' 安装成功');load()}
      else{toast('安装失败: '+(d.error||'未知错误'));b.disabled=false;b.textContent='安装'}
    }).catch(function(){toast('安装失败');b.disabled=false;b.textContent='安装'});
    PENDING_INSTALL=null;
  }

  // Source modal
  window.openSourceModal=function(){
    fetch('/api/market/source').then(function(r){return r.json()}).then(function(d){
      document.getElementById('src-input').value=d.url||'';
      var mirrors=d.mirrors||[];
      var lines=mirrors.map(function(m){
        if(typeof m==='string')return m;
        if(m.name&&m.url)return m.name+'|'+m.url;
        return m.url||'';
      });
      document.getElementById('src-mirrors-input').value=lines.join('\n');
      document.getElementById('src-modal').classList.add('show');
    });
  };
  window.closeSourceModal=function(){document.getElementById('src-modal').classList.remove('show')};
  window.saveSource=function(){
    var url=document.getElementById('src-input').value.trim();
    if(!url){toast('请输入官方源 URL');return}
    var raw=document.getElementById('src-mirrors-input').value.trim();
    var mirrors=[];
    if(raw){
      raw.split('\n').forEach(function(line){
        line=line.trim();
        if(!line)return;
        var parts=line.split('|');
        if(parts.length>=2){
          mirrors.push({name:parts[0].trim(),url:parts.slice(1).join('|').trim()});
        }else{
          mirrors.push({url:line});
        }
      });
    }
    fetch('/api/market/source',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,mirrors:mirrors})}).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('源已保存');closeSourceModal();load()}
      else{toast('保存失败: '+(d.error||'未知错误'))}
    }).catch(function(){toast('保存失败')});
  };

  // ── 镜像 ────────────────────────────────────────────────────────
  window.openMirrorModal=function(){
    renderMirrorList();
    document.getElementById('mirror-modal').classList.add('show');
  };
  window.closeMirrorModal=function(){document.getElementById('mirror-modal').classList.remove('show')};

  function renderMirrorList(){
    var box=document.getElementById('mirror-list');
    box.innerHTML='';
    MIRRORS.forEach(function(m,i){
      var div=document.createElement('div');
      div.className='mirror-item'+(m.url===CURRENT_MIRROR?' active':'');
      var lat=m.latency!=null?m.latency:null;
      var latCls=lat==null?'':(lat<500?'fast':(lat>2000?'slow':''));
      var latText=lat==null?'—':(lat>=99999?'超时':lat+'ms');
      div.innerHTML=
        '<div style="flex:1"><div class="name">'+m.name+'</div>'+
        '<div class="url">'+m.url+'</div></div>'+
        '<div class="lat '+latCls+'">'+latText+'</div>';
      div.onclick=function(){selectMirror(m.url)};
      box.appendChild(div);
    });
  }

  function selectMirror(url){
    fetch('/api/market/mirrors/set',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:url})
    }).then(function(r){return r.json()}).then(function(d){
      if(d.success){
        CURRENT_MIRROR=d.current;
        renderMirrorBar();
        renderMirrorList();
        toast('已切换加速源');
      }
    }).catch(function(){toast('设置失败')});
  }

  window.speedTest=function(){
    toast('测速中，请稍候...');
    fetch('/api/market/mirrors/speedtest').then(function(r){return r.json()}).then(function(d){
      if(!d||!d.results)return;
      d.results.forEach(function(r){
        var m=MIRRORS.find(function(x){return x.url===r.url});
        if(m)m.latency=r.latency;
      });
      FASTEST_MIRROR=d.fastest||'';
      document.getElementById('use-fastest-btn').disabled=!FASTEST_MIRROR;
      renderMirrorList();
      toast('测速完成');
    }).catch(function(){toast('测速失败')});
  };

  window.useFastest=function(){
    if(!FASTEST_MIRROR)return;
    selectMirror(FASTEST_MIRROR);
  };

  window.addCustomMirror=function(){
    var name=document.getElementById('custom-mirror-name').value.trim();
    var url=document.getElementById('custom-mirror-url').value.trim();
    if(!url){toast('请输入 URL');return}
    fetch('/api/market/mirrors/custom',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name,url:url})
    }).then(function(r){return r.json()}).then(function(d){
      if(d.success){
        toast('已添加');
        document.getElementById('custom-mirror-name').value='';
        document.getElementById('custom-mirror-url').value='';
        loadMirrors();
        setTimeout(renderMirrorList,200);
      }else{toast('添加失败: '+(d.error||''))}
    }).catch(function(){toast('添加失败')});
  };

  // ── 详情弹窗 ────────────────────────────────────────────────────
  function openDetail(p){
    DETAIL_PLUGIN=p;
    document.getElementById('detail-icon').textContent=(p.name||'?').charAt(0).toUpperCase();
    document.getElementById('detail-name').textContent=p.name||'';
    document.getElementById('detail-meta').textContent='v'+(p.version||'?')+' · '+(p.author||'未知')+(p.size?' · '+p.size:'');
    document.getElementById('detail-desc').textContent=p.description||'（无描述）';
    var tagsEl=document.getElementById('detail-tags');
    tagsEl.innerHTML=(p._tags||[]).map(function(t){return '<span class="chip">'+t+'</span>'}).join('');
    var hp=document.getElementById('detail-homepage');
    if(p.homepage){hp.style.display='';hp.href=p.homepage}else{hp.style.display='none'}
    var btn=document.getElementById('detail-install-btn');
    if(p.installed){btn.disabled=true;btn.textContent='已安装'}
    else{btn.disabled=false;btn.textContent='安装';btn.onclick=function(){
      closeDetailModal();
      startInstall(p.name,btn);
    }}
    document.getElementById('detail-readme').textContent='加载中...';
    document.getElementById('detail-modal').classList.add('show');
    fetch('/api/market/plugins/'+encodeURIComponent(p.name)+'/readme').then(function(r){return r.json()}).then(function(d){
      if(d&&d.readme){
        document.getElementById('detail-readme').innerHTML=formatMarkdown(d.readme);
      }else{
        document.getElementById('detail-readme').textContent='暂无 README';
      }
    }).catch(function(){document.getElementById('detail-readme').textContent='加载失败'});
  }
  window.closeDetailModal=function(){document.getElementById('detail-modal').classList.remove('show')};

  function formatMarkdown(text){
    if(!text)return '';
    var lines=text.split('\n');
    var out=[];
    var inCode=false;
    for(var i=0;i<lines.length;i++){
      var line=lines[i];
      if(line.startsWith('```')){
        inCode=!inCode;
        out.push(inCode?'<pre>':'</pre>');
        continue;
      }
      if(inCode){out.push(escapeHtml(line));continue}
      if(line.startsWith('# ')){out.push('<h1>'+inlineMd(line.slice(2))+'</h1>')}
      else if(line.startsWith('## ')){out.push('<h2>'+inlineMd(line.slice(3))+'</h2>')}
      else if(line.startsWith('### ')){out.push('<h3>'+inlineMd(line.slice(4))+'</h3>')}
      else if(line.startsWith('- ')){out.push('<div>• '+inlineMd(line.slice(2))+'</div>')}
      else if(line.trim()===''){out.push('<br>')}
      else{out.push('<div>'+inlineMd(line)+'</div>')}
    }
    return out.join('\n');
  }
  function inlineMd(s){
    s=escapeHtml(s);
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
    return s;
  }
  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.uploadPlugin=function(input){
    var f=input.files[0];if(!f)return;
    var fd=new FormData();fd.append('file',f);
    toast('正在导入 '+f.name+' ...');
    fetch('/api/plugins/upload',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
      if(d.success){toast('插件 '+d.name+' 导入成功');load()}else{toast('导入失败: '+(d.error||'未知错误'))}
    }).catch(function(){toast('导入失败')});
    input.value='';
  };

  load();
})();
</script></body></html>
