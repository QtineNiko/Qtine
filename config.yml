adapters:
  discord:
    enabled: false
    token: ''
  onebot_v11:
    access_token: ''
    enabled: true
    forward_ws_enabled: false
    forward_ws_url: ws://127.0.0.1:3001
    heartbeat_interval: 30
    reconnect_interval: 5
    ws_path: /onebot/v11
  telegram:
    bot_token: ''
    enabled: false
ai:
  api_key: ''
  base_url: ''
  enabled: false
  max_tokens: 2048
  model: gpt-3.5-turbo
  provider: openai
  temperature: 0.7
logging:
  backup_count: 5
  file: ./data/logs/qtine.log
  level: INFO
  max_size_mb: 10
plugins:
  allow_dependency_install: false
  autoload: []
  dir: ./plugins
  marketplace_url: ''
security:
  production_mode: true
  login_attempts: 5
  login_window_seconds: 300
  blacklist:
    enabled: true
    groups: []
    users: []
  rate_limit:
    burst: 10
    enabled: true
    messages_per_second: 5
  sensitive_words:
    enabled: false
    word_file: ./data/sensitive_words.txt
  super_admins: []
server:
  debug: false
  host: 0.0.0.0
  port: 4990
  trusted_proxy_hops: 0
storage:
  backend: sqlite
  backup_interval_hours: 24
  backup_keep_count: 7
  sqlite_path: ./data/qtine.db
update:
  check_enabled: true
  check_url: https://cdn.jsdelivr.net/gh/QtineNiko/Qtine@main/latest.json
  include_prerelease: false
webui:
  allow_process_control: false
  allowed_origins: []
  enabled: true
  password: qtine123
  secure_cookie: false
  session_secret: change-me-in-production
  theme: material-purple
  username: admin
